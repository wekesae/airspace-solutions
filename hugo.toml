baseURL = "https://wekesae.github.io/airspace-solutions/"
title = "Enterprise Systems & VoIP Infrastructure Engineering"
theme = "airspace-hugo"
languageCode = "en-us"
defaultContentLanguage = "en"

[params]
  # Main Hero Banner Configuration Block
  [params.hero]
    enable = true
    title = "Enterprise Communications & Systems Infrastructure Solutions"
    description = "Deploying and hardening highly resilient, secure open-source system solutions—from unified call center networks to robust point-of-sale environments."
    btnText = "Explore Our Infrastructure Solutions"
    btnLink = "#solutions-matrix"

  # Core About Introduction Section Block
  [params.about]
    enable = true
    title = "System Architecture and Security Hardening"
    description = "We design, optimize, and maintain critical infrastructure stacks tailored for modern business environments. Our technical focus bridges the gap between resilient open-source platforms, automated commercial databases, and hardened endpoint administration."

  # Core Solutions / Service Grid Section Block
  [params.service]
    enable = true
    title = "Our Core Technical Solutions"
    subtitle = "Tailored systems deployment and systems administration frameworks designed for absolute operational uptime."

    [[params.service.item]]
      icon = "tf-ion-ios-telephone-outline"
      title = "Unified VoIP & Call Center Deployments"
      description = "Full orchestration and optimization of open-source telephony engines including Asterisk, IssabelPBX, and VitalPBX. Specialized in robust multi-tier IVR setups, automatic call distribution (ACD) queues, NAT traversal tuning, and secure remote WebRTC web-phone infrastructure."

    [[params.service.item]]
      icon = "tf-ion-android-cart"
      title = "POS Systems & Operational CRM Integration"
      description = "End-to-end integration of open-source Point of Sale (POS) retail architectures with automated back-office databases. Seamlessly coupled with custom on-premise CRM platforms to manage unified order pipelines and event execution metadata tracking."

    [[params.service.item]]
      icon = "tf-ion-ios-locked-outline"
      title = "Infrastructure Administration & Security Hardening"
      description = "Proactive tracking and mitigation of security vectors via regular server CVE audits. Expertise in firewall hardening, secure remote server workspace administration via Visual Studio Code SSH tunnels, and automated snapshot recovery architectures."
