baseURL = "https://wekesae.github.io/airspace-solutions/"
title = "Enterprise Systems & VoIP Infrastructure Engineering"
theme = "airspace-hugo"
languageCode = "en-us"
defaultContentLanguage = "en"

# -------------------------------------------------------------------------
# Theme Engine Structural Design Variables (Fixes the SCSS Compiler Error)
# -------------------------------------------------------------------------
[params]
  # Theme Fonts
  font_family = "Playfair+Display:serif|Roboto:sans-serif"
  font_primary = "Roboto, sans-serif"
  font_secondary = "Playfair Display, serif"

  # Theme Assets and Styling Elements
  logo = ""
  custom_css = []
  custom_js = []

  # Main Hero Banner Component
  [params.hero]
    enable = true
    title = "Enterprise Communications & Systems Infrastructure Solutions"
    description = "Deploying and hardening highly resilient, secure open-source system solutions—from unified call center networks to robust point-of-sale environments."
    btnText = "Explore Our Technical Solutions"
    btnLink = "#solutions-matrix"

  # Core About Component
  [params.about]
    enable = true
    title = "System Architecture and Security Hardening"
    description = "We design, optimize, and maintain critical infrastructure stacks tailored for modern business environments. Our technical focus bridges the gap between resilient open-source platforms, automated commercial databases, and hardened endpoint administration."

  # Feature Rows Component
  [params.feature]
    enable = true
    title = "Why Partner With Us?"
    [[params.feature.feature_item]]
      title = "Uptime-First Engineering Philosophy"
      content = "All configurations are built using clean infrastructure-as-code foundations to guarantee that networks, SIP interfaces, and point-of-sale databases achieve seamless continuity."
    [[params.feature.feature_item]]
      title = "Strict Open-Source Core Architectures"
      content = "Eliminate predatory software licensing vendor fees by deploying enterprise-grade open-source tools like Asterisk, Issabel, and hardened server daemons."

  # Services Grid Component
  [params.service]
    enable = true
    title = "Our Core Technical Solutions"
    subtitle = "Tailored systems deployment and administration frameworks designed for absolute operational uptime."
    [[params.service.service_item]]
      icon = "tf-ion-ios-telephone-outline"
      title = "Unified VoIP & Call Center Deployments"
      content = "Full orchestration and optimization of open-source telephony engines including Asterisk, IssabelPBX, and VitalPBX. Specialized in robust multi-tier IVR setups, automatic call distribution (ACD) queues, NAT traversal tuning, and secure remote WebRTC web-phone infrastructure."
    [[params.service.service_item]]
      icon = "tf-ion-android-cart"
      title = "POS Systems & Operational CRM Integration"
      content = "End-to-end integration of open-source Point of Sale (POS) retail architectures with automated back-office databases. Seamlessly coupled with custom on-premise CRM platforms to manage unified order pipelines and event execution metadata tracking."
    [[params.service.service_item]]
      icon = "tf-ion-ios-locked-outline"
      title = "Infrastructure Administration & Security Hardening"
      content = "Proactive tracking and mitigation of security vectors via regular server CVE audits. Expertise in firewall hardening, secure remote server workspace administration via Visual Studio Code SSH tunnels, and automated snapshot recovery architectures."
