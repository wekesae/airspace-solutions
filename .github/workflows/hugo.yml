name: Deploy Airspace Site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.2
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Fetch Free Airspace Theme Assets
        run: |
          mkdir -p themes
          git clone https://github.com/themefisher/airspace-hugo.git themes/airspace-hugo

      - name: Build Site Structure Following Theme Documentation
        run: |
          # 1. Back up custom directories to a temporary location safely
          mkdir -p /tmp/custom-content /tmp/custom-data
          if [ -d content ]; then cp -r content/* /tmp/custom-content/ 2>/dev/null || true; fi
          if [ -d data ]; then cp -r data/* /tmp/custom-data/ 2>/dev/null || true; fi
          
          # 2. Extract the complete working example structure from the theme
          cp -r themes/airspace-hugo/exampleSite/* .
          
          # 3. Layer your custom content back on top, cleanly overwriting placeholders
          if [ "$(ls -A /tmp/custom-content 2>/dev/null)" ]; then
            cp -r /tmp/custom-content/* ./content/
          fi
          if [ "$(ls -A /tmp/custom-data 2>/dev/null)" ]; then
            cp -r /tmp/custom-data/* ./data/
          fi

          # 4. Correct base URLs inside the standard config file
          TARGET_CONFIG=""
          if [ -f hugo.toml ]; then TARGET_CONFIG="hugo.toml"; fi
          if [ -f config.toml ]; then TARGET_CONFIG="config.toml"; fi

          if [ ! -z "$TARGET_CONFIG" ]; then
            sed -i 's|themesDir = "..\/\..\"|themesDir = "themes"|g' "$TARGET_CONFIG"
            sed -i "s|baseURL = \".*\"|baseURL = \"https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/\"|g" "$TARGET_CONFIG"
          fi

      - name: Setup Hugo Extended Build Engine
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Compile Corporate Static Package
        run: hugo --gc --minify

      - name: Upload Build Artifact Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publish Live to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
